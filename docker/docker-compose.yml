services:
  postgres:
    image: postgres:15
    container_name: control_plane_db
    restart: always
    environment:
      POSTGRES_USER: aryamansondhi
      POSTGRES_PASSWORD: A61shivalik
      POSTGRES_DB: control_plane
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: control_plane_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://aryamansondhi:A61shivalik@postgres:5432/control_plane
    depends_on:
      - postgres

volumes:
  postgres_data: